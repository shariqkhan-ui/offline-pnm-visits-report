name: PNM device rollout — daily report

on:
  schedule:
    # 10:00 AM IST primary + 30-min backups (idempotent via .posted-pnm marker)
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '0 5 * * *'    # 10:30 AM IST
    - cron: '30 5 * * *'   # 11:00 AM IST
    - cron: '0 6 * * *'    # 11:30 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      MARKER_KEY: pnm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute report-day + marker
        id: paths
        run: |
          DAY=$(TZ=Asia/Kolkata date -d 'yesterday' +%Y-%m-%d)
          echo "day=$DAY" >> $GITHUB_OUTPUT
          echo "marker=reports/$DAY.posted-${MARKER_KEY}" >> $GITHUB_OUTPUT

      - name: Skip if already posted
        id: check
        run: |
          if [ -f "${{ steps.paths.outputs.marker }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Chrome
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable || \
            (wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && \
             sudo apt-get install -y -qq ./google-chrome-stable_current_amd64.deb)

      - name: Render report image (yesterday-anchored)
        if: steps.check.outputs.skip != 'true'
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from datetime import datetime, timedelta, timezone
          from report import compute, render_html, screenshot, HTML_PATH, PNG_PATH
          now = datetime.now(timezone.utc) + timedelta(hours=5, minutes=30)
          d, t, y, d2, d3 = compute(now.date(), include_today=False)
          open(HTML_PATH, 'w', encoding='utf-8').write(render_html(d, t, y, d2, d3))
          screenshot(HTML_PATH, PNG_PATH)
          "

      - name: Commit PNG so raw URL is live
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p reports
          cp report.png "reports/${{ steps.paths.outputs.day }}.png"
          cp report.png reports/latest.png
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add reports/
          git commit -m "report: ${{ steps.paths.outputs.day }} (image, ${MARKER_KEY})" || echo "no changes"
          git pull --rebase || true
          git push

      - name: Post to PNM device rollout channel (with cc)
        if: steps.check.outputs.skip != 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_IDS: C0ANNECCPV4
          MODE: yesterday
          INCLUDE_CC: 'true'
          HARMEET_USER_ID: ${{ secrets.HARMEET_USER_ID }}
          WHATSAPPER_USER_ID: ${{ secrets.WHATSAPPER_USER_ID }}
          IMAGE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/reports/${{ steps.paths.outputs.day }}.png
        run: python report.py

      - name: Commit posted marker
        if: steps.check.outputs.skip != 'true' && success()
        run: |
          echo "Posted at $(date -u --iso-8601=seconds) by ${{ github.run_id }}" \
            > "${{ steps.paths.outputs.marker }}"
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add "${{ steps.paths.outputs.marker }}"
          git commit -m "report: ${{ steps.paths.outputs.day }} (marker, ${MARKER_KEY})"
          git pull --rebase || true
          git push
